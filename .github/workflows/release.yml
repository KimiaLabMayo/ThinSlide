name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Linux x86_64 musl static (thinslide CLI only) ──────────────────────────
  build-linux-musl:
    name: Linux x86_64 (musl static)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y musl-tools musl-dev cmake nasm curl

      - name: Build zlib (musl static)
        run: |
          curl -sL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz | tar -xz
          cd zlib-1.3.1
          CC=musl-gcc ./configure --static --prefix=/usr/local/musl-libs
          make -j$(nproc) && sudo make install

      - name: Build libtiff (musl static, JPEG disabled)
        run: |
          curl -sL https://download.osgeo.org/libtiff/tiff-4.7.1.tar.gz | tar -xz
          cd tiff-4.7.1
          CC=musl-gcc \
            CPPFLAGS="-I/usr/local/musl-libs/include" \
            LDFLAGS="-L/usr/local/musl-libs/lib" \
            ./configure \
              --host=x86_64-linux-musl \
              --prefix=/usr/local/musl-libs \
              --enable-static --disable-shared \
              --disable-jpeg --disable-old-jpeg \
              --disable-jbig --disable-lzma \
              --disable-zstd --disable-webp --disable-jpeg12 \
              --without-x
          make -j$(nproc) && sudo make install

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-musl-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build thinslide
        env:
          CC: musl-gcc
          CXX: musl-g++
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          TIFF_LIB_DIR: /usr/local/musl-libs/lib
          TIFF_STATIC: "1"
          TURBOJPEG_SOURCE: vendor
          TURBOJPEG_STATIC: "1"
          LCMS2_STATIC: "1"
          PKG_CONFIG_ALLOW_CROSS: "1"
        run: cargo build --release --bin thinslide --target x86_64-unknown-linux-musl

      - name: Verify static binary
        run: |
          file target/x86_64-unknown-linux-musl/release/thinslide
          ldd target/x86_64-unknown-linux-musl/release/thinslide 2>&1 | grep -qE "not a dynamic executable|statically linked"
          echo "OK: binary is statically linked"

      - name: Rename artifact
        run: cp target/x86_64-unknown-linux-musl/release/thinslide thinslide-linux-x86_64-musl

      - uses: actions/upload-artifact@v4
        with:
          name: thinslide-linux-musl
          path: thinslide-linux-x86_64-musl

  # ── macOS arm64 (thinslide + thinslide-gui) ────────────────────────────────
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Homebrew deps
        run: brew install pkg-config

      - name: Build zlib (macOS static)
        run: |
          curl -sL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz | tar -xz
          cd zlib-1.3.1
          cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_INSTALL_PREFIX=${{ runner.temp }}/zlib-static"
          cmake --build build --config Release --parallel
          cmake --install build --config Release

      - name: Build libtiff (macOS static, JPEG disabled)
        run: |
          curl -sL https://download.osgeo.org/libtiff/tiff-4.7.1.tar.gz | tar -xz
          cd tiff-4.7.1
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            "-DCMAKE_INSTALL_PREFIX=${{ runner.temp }}/tiff-static" \
            "-DCMAKE_PREFIX_PATH=${{ runner.temp }}/zlib-static" \
            -Dtiff-tools=OFF -Dtiff-tests=OFF -Dtiff-docs=OFF \
            -Djpeg=OFF -Dold-jpeg=OFF -Dlzma=OFF -Dzstd=OFF -Dwebp=OFF -Djbig=OFF -Dlibdeflate=OFF
          cmake --build build --config Release --parallel
          cmake --install build --config Release

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build thinslide + thinslide-gui
        env:
          TIFF_LIB_DIR: ${{ runner.temp }}/tiff-static/lib
          TIFF_STATIC: "1"
          ZLIB_LIB_DIR: ${{ runner.temp }}/zlib-static/lib
          LCMS2_STATIC: "1"
        run: cargo build --release --bin thinslide --bin thinslide-gui

      - name: Rename artifacts
        run: |
          cp target/release/thinslide thinslide-macos-arm64
          cp target/release/thinslide-gui thinslide-gui-macos-arm64

      - name: Package .app and .dmg
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          ./scripts/package_macos_app.sh target/release/thinslide-gui "$VERSION" .

      - uses: actions/upload-artifact@v4
        with:
          name: thinslide-macos-arm64
          path: |
            thinslide-macos-arm64
            thinslide-gui-macos-arm64
            thinslide-macos-arm64.dmg

  # ── Windows x86_64 MSVC (thinslide + thinslide-gui) ────────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install NASM
        run: choco install nasm --yes

      - name: Add NASM to PATH
        run: echo "C:\Program Files\NASM" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Build zlib (MSVC static)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zlibVer = "1.3.1"
          Invoke-WebRequest "https://github.com/madler/zlib/releases/download/v$zlibVer/zlib-$zlibVer.tar.gz" -OutFile zlib.tar.gz
          tar -xf zlib.tar.gz
          cd "zlib-$zlibVer"
          # Upstream CMake emits the static archive as `zlibstatic.lib` under lib/.
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_INSTALL_PREFIX=C:\zlib-static"
          cmake --build build --config Release --parallel
          cmake --install build --config Release
          "ZLIB_LIB_DIR=C:\zlib-static\lib"  | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "ZLIB_LIB_NAME=zlibstatic"         | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Build libtiff (MSVC static)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tiffVer = "4.7.1"
          Invoke-WebRequest "https://download.osgeo.org/libtiff/tiff-$tiffVer.tar.gz" -OutFile tiff.tar.gz
          tar -xf tiff.tar.gz
          cd "tiff-$tiffVer"
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            "-DCMAKE_INSTALL_PREFIX=C:\tiff-static" `
            "-DCMAKE_PREFIX_PATH=C:\zlib-static" `
            -Dtiff-tools=OFF -Dtiff-tests=OFF -Dtiff-docs=OFF `
            -Djpeg=OFF -Dold-jpeg=OFF -Dlzma=OFF -Dzstd=OFF -Dwebp=OFF -Djbig=OFF
          cmake --build build --config Release --parallel
          cmake --install build --config Release

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build thinslide + thinslide-gui
        env:
          TIFF_LIB_DIR: C:\tiff-static\lib
          TIFF_STATIC: "1"
          # ZLIB_LIB_DIR / ZLIB_LIB_NAME come from the "Build zlib (MSVC static)" step.
          TURBOJPEG_SOURCE: vendor
          TURBOJPEG_STATIC: "1"
        run: cargo build --release --bin thinslide --bin thinslide-gui

      - name: Rename artifacts
        run: |
          Copy-Item target\release\thinslide.exe thinslide-windows-x86_64.exe
          Copy-Item target\release\thinslide-gui.exe thinslide-gui-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: thinslide-windows-x86_64
          path: |
            thinslide-windows-x86_64.exe
            thinslide-gui-windows-x86_64.exe

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux-musl, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            thinslide-linux-x86_64-musl
            thinslide-macos-arm64
            thinslide-gui-macos-arm64
            thinslide-macos-arm64.dmg
            thinslide-windows-x86_64.exe
            thinslide-gui-windows-x86_64.exe
