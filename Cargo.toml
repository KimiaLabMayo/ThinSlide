[package]
name = "dcm2tiff"
version = "0.1.0"
edition = "2024"
links = "tiff"

[build-dependencies]
pkg-config = "0.3"

[dependencies]
rayon = "1"
turbojpeg = "1"
fast_image_resize = "4"
jp2k = "0.3"
indicatif = "0.17"
dicom = "0.9.0"
dicom-core = "0.9.0"
dicom-dictionary-std = "0.9.0"
dicom-object = "0.9.0"
dicom-pixeldata = { version = "0.9.0", features = ["image", "openjp2"] }
image = "0.25"
tiff = "0.11.3"
walkdir = "2.5.0"
